pre-commit:
  piped: true
  jobs:
    - name: format
      run: pnpm oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    - name: lint
      run: pnpm oxlint --format unix {staged_files}
      stage_fixed: true

    - name: type checking
      run: pnpm turbo --no-color type-check

commit-msg:
  jobs:
    - name: lint message
      run: pnpm commitlint --edit {1}

