templates:
  oxfmt_flags: --no-error-on-unmatched-pattern
  oxlint_flags: --format unix
  pnpm_flags: --parallel --aggregate-output --if-present

pre-commit:
  piped: true
  jobs:
    - name: format
      run: pnpm oxfmt {oxfmt_flags} {staged_files}
      stage_fixed: true

    - name: lint
      run: pnpm oxlint {oxlint_flags} {staged_files}
      stage_fixed: true

    - name: type checking
      run: |
        packages=$(echo {staged_files} | tr ' ' '\n' | grep -E '^(packages|services)/' | awk -F '/' '{print "--filter ./" $1 "/" $2 "..."}' | sort -u)
        if [[ -n $packages ]]; then
          pnpm $packages run {pnpm_flags} type-check
        fi

commit-msg:
  jobs:
    - name: lint message
      run: pnpm commitlint --edit {1}

