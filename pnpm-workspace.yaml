packages:
  - packages/*
  - services/*

catalog:
  # deps
  typescript: ^6.0.2
  '@typescript/native-preview': ^7.0.0-dev.20260519.1
  tsx: ^4.21.0
  # dev deps
  '@types/node': ^24
  pino-pretty: ^13.1.3
  # test deps
  vitest: ^4.1.6
  vite-tsconfig-paths: ^6.1.1
  '@vitest/coverage-v8': ^4.1.6
  vitest-mock-extended: ^4.0.0

minimumReleaseAge: 1440

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: false
  lefthook: true
  msw: false
  prisma: false

injectWorkspacePackages: false
